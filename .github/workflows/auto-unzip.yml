name: Auto Unzip Uploaded Files

on:
  push:
    paths:
      - '**.zip'
  workflow_dispatch:
    inputs:
      zip_file:
        description: 'Path to zip file to extract'
        required: true
        default: 'upload.zip'

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Find zip files
      id: find-zips
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "zip_files=${{ github.event.inputs.zip_file }}" >> $GITHUB_OUTPUT
        else
          # Find all zip files in the repository
          zip_files=$(find . -name "*.zip" -type f | tr '\n' ' ' | sed 's/ $//')
          echo "zip_files=$zip_files" >> $GITHUB_OUTPUT
        fi
        echo "Found zip files: ${{ steps.find-zips.outputs.zip_files }}"
        
    - name: Extract zip files
      run: |
        # Create extraction directory
        mkdir -p extracted_files
        
        # Split zip files by space and process each
        for zip_file in ${{ steps.find-zips.outputs.zip_files }}; do
          if [ -f "$zip_file" ]; then
            echo "Extracting: $zip_file"
            
            # Create subdirectory for this zip
            zip_name=$(basename "$zip_file" .zip)
            extract_dir="extracted_files/$zip_name"
            mkdir -p "$extract_dir"
            
            # Extract the zip file
            unzip -q "$zip_file" -d "$extract_dir"
            
            # List extracted files
            echo "Extracted files from $zip_name:"
            find "$extract_dir" -type f | head -20
            echo "---"
          fi
        done
        
    - name: Check for changes
      id: changes
      run: |
        # Check if there are any extracted files
        if [ -d "extracted_files" ] && [ "$(ls -A extracted_files)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Found extracted files to commit"
          
          # Show summary of extracted files
          echo "Extracted file summary:"
          find extracted_files -type f | wc -l | xargs echo "Total files:"
          du -sh extracted_files | cut -f1 | xargs echo "Total size:"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "No extracted files found"
        fi
        
    - name: Configure Git
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
    - name: Add and commit extracted files
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        # Add all extracted files
        git add extracted_files/
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          # Create commit message
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            commit_msg="Auto-extract files from ${{ github.event.inputs.zip_file }}"
          else
            commit_msg="Auto-extract uploaded zip files"
          fi
          
          git commit -m "$commit_msg"
          
          # Push changes
          git push
          
          echo "Successfully committed extracted files"
        fi
        
    - name: Create summary
      run: |
        echo "## 📦 Auto Unzip Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.changes.outputs.has_changes }}" == 'true' ]; then
          echo "✅ Successfully extracted and committed zip files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📁 Extracted Files" >> $GITHUB_STEP_SUMMARY
          find extracted_files -type d | sort | while read dir; do
            if [ "$dir" != "extracted_files" ]; then
              dir_name=$(basename "$dir")
              file_count=$(find "$dir" -type f | wc -l)
              echo "- **$dir_name**: $file_count files" >> $GITHUB_STEP_SUMMARY
            fi
          done
        else
          echo "❌ No zip files found or extraction failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔧 Triggered by" >> $GITHUB_STEP_SUMMARY
        echo "- Event: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "- Manual trigger: ${{ github.event.inputs.zip_file }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "- Push to ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Clean up original zip files (optional)
      if: github.event_name == 'push'
      run: |
        # Optionally remove original zip files after extraction
        echo "Cleaning up original zip files..."
        for zip_file in ${{ steps.find-zips.outputs.zip_files }}; do
          if [ -f "$zip_file" ]; then
            echo "Removing: $zip_file"
            rm "$zip_file"
          fi
        done
        
        # Commit the cleanup
        git add -A
        if git diff --staged --quiet; then
          echo "No cleanup changes to commit"
        else
          git commit -m "Clean up original zip files after extraction"
          git push
        fi
